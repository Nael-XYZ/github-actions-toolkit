name: Setup Tools
description: Auto-detect and cache project dependencies
inputs:
  node:
    description: Install Node.js
    default: 'false'
  python:
    description: Python version
    default: ''
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      if: inputs.node == 'true'
      with:
        node-version: 20
        cache: npm
    - uses: actions/setup-python@v5
      if: inputs.python != ''
      with:
        python-version: ${{ inputs.python }}
        cache: pip
